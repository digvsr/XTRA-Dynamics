<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XTRA DYNAMICS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --cyan:    #00FFFF;
  --fuchsia: #FF00FF;
  --violet:  #9D00FF;
  --vpale:   #E0AAFF;
  --white:   #F0F0F0;
  --blue:    #1E6EFF;
  --red:     #FF2255;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Orbitron', monospace;
}

/* ── STAGE ── */
#stage { position: fixed; inset: 0; width: 100vw; height: 100vh; }

#venom-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* scanline overlay */
#scan-overlay {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,255,255,.012) 2px, rgba(0,255,255,.012) 4px
  );
  pointer-events: none;
  z-index: 100;
  animation: scanmove 8s linear infinite;
}
@keyframes scanmove {
  0%   { background-position: 0 0; }
  100% { background-position: 0 100px; }
}

/* ── BRAND UNIT — INTRO ── */
#brand-unit {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 2; pointer-events: none;
  opacity: 0; gap: 4px; /* FIX: tightened gap from 10px to 4px */
}
#brand-unit.show { opacity: 1; transition: opacity 0.8s ease; }

#logo-img {
  width: clamp(260px, 42vw, 580px);
  height: auto;
  opacity: 0;
  transform: translateY(22px);
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  filter: drop-shadow(0 0 20px rgba(30,110,255,.55))
          drop-shadow(0 0 6px rgba(0,255,255,.3));
}
#logo-img.show {
  opacity: 1;
  transform: translateY(0);
}

#brand-tagline {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: clamp(8px, 1vw, 11px); /* FIX: slightly smaller so it sits snug under logo */
  letter-spacing: .45em;
  color: var(--red);
  text-shadow: 0 0 10px var(--red);
  opacity: 0;
  transition: opacity 0.6s ease 0.4s;
  text-transform: uppercase;
  margin-top: 2px; /* FIX: minimal gap */
}
#brand-tagline.show { opacity: 1; }

/* ── SCENES ── */
.scene {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  z-index: 5;
  transition: opacity 1s ease;
}
.scene.show { opacity: 1; }

/* ── MISSILE SCENE ── */
#missile-inner {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  opacity: 0; transform: scale(0.97);
  transition: opacity 1s ease, transform 1s ease;
}
#missile-inner.show { opacity: 1; transform: scale(1); }

#missile-label {
  font-size: clamp(8px, 1.1vw, 11px);
  letter-spacing: 8px;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
}

#missile-frame {
  position: relative;
  width: clamp(280px, 54vw, 740px);
  height: clamp(200px, 38vh, 480px);
  border: 1px solid #1a004a;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  /* FIX: removed ::before and ::after corner box pseudo-elements */
}

#missile-video {
  width: 100%; height: 100%;
  object-fit: contain;
  background: #000;
  /* FIX: boost brightness so video pops */
  filter: brightness(1.6) contrast(1.1) saturate(1.2);
}

/* HUD corner labels */
.hud-tl, .hud-tr, .hud-bl, .hud-br {
  position: absolute;
  font-family: 'Rajdhani', sans-serif;
  font-size: 9px; letter-spacing: .12em;
  color: var(--cyan); opacity: .55; z-index: 3;
}
.hud-tl { top: 8px; left: 36px; }
.hud-tr { top: 8px; right: 36px; text-align: right; }
.hud-bl { bottom: 8px; left: 36px; }
.hud-br { bottom: 8px; right: 36px; text-align: right; }

#missile-specs {
  display: flex; align-items: center; gap: 14px;
  font-size: clamp(7px, .9vw, 9px); letter-spacing: 3px;
  font-family: 'Rajdhani', sans-serif; font-weight: 600;
}
.spec { color: #555; }
.spec em { font-style: normal; color: var(--cyan); margin-left: 6px; }
.sdiv { color: #1a004a; }

/* ── END CARD ── */
#end-inner {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  opacity: 0; transition: opacity 1.4s ease;
}
#end-inner.show { opacity: 1; }

#end-logo-img {
  width: clamp(280px, 44vw, 600px);
  height: auto;
  filter: drop-shadow(0 0 28px rgba(30,110,255,.7))
          drop-shadow(0 0 8px rgba(0,255,255,.4));
}
#end-credit {
  font-size: clamp(8px, .9vw, 11px); /* FIX: slightly larger */
  letter-spacing: 3px;
  color: #aaa; /* FIX: was #333 (invisible on black) — now readable */
  font-family: 'Rajdhani', sans-serif;
  font-weight: 300;
}
</style>
</head>
<body>

<div id="scan-overlay"></div>

<div id="stage">
  <canvas id="venom-canvas"></canvas>

  <!-- INTRO BRAND -->
  <div id="brand-unit">
    <img id="logo-img" src="assets/images/logo.png" alt="XTRA DYNAMICS"/>
    <div id="brand-tagline">Precision Engineering</div>
  </div>

  <!-- MISSILE SCENE -->
  <div class="scene" id="scene-missile">
    <div id="missile-inner">
      <div id="missile-label">PROTOTYPE — XTRA IO VANGAURD</div>
      <div id="missile-frame">
        <div class="hud-tl">SYS·ONLINE</div>
        <div class="hud-tr">STATUS·NOMINAL</div>
        <div class="hud-bl">XTRA·VANGAURD // CLASSIFIED</div>
        <div class="hud-br">CEP·0.8m // MACH·4.2</div>
        <video id="missile-video" autoplay muted loop playsinline>
          <source src="assets/video/missile.mp4" type="video/mp4"/>
        </video>
      </div>
      <div id="missile-specs">
        <span class="spec">DESIGNATION <em>XTRA-10-VANGAURD</em></span>
        <span class="sdiv">|</span>
        <span class="spec">CLASS <em>PROTOTYPE</em></span>
        <span class="sdiv">|</span>
        <span class="spec">STATUS <em>CLASSIFIED</em></span>
      </div>
    </div>
  </div>

  <!-- END CARD -->
  <div class="scene" id="scene-end">
    <div id="end-inner">
      <img id="end-logo-img" src="assets/images/logo.png" alt="XTRA DYNAMICS"/>
      <div id="end-credit">© REKOILE MEDIA PRODUCTIONS · ALL RIGHTS RESERVED</div>
    </div>
  </div>
</div>

<script>
/* ── VENOM TENDRILS ── */
(function () {
  const vc  = document.getElementById('venom-canvas');
  const ctx = vc.getContext('2d');
  let W, H;

  const COLORS = ['#9D00FF','#FF00FF','#00FFFF','#1E6EFF','#FF2255'];
  const N = 90;
  const nodes = [];

  function resize() {
    W = vc.width  = window.innerWidth;
    H = vc.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Node {
    constructor() { this.reset(); }
    reset() {
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = (Math.random() - 0.5) * 0.5;
      this.r  = Math.random() * 1.5 + 0.4;
      this.c  = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.life    = 0;
      this.maxLife = 300 + Math.random() * 400;
    }
    update() {
      this.x += this.vx; this.y += this.vy; this.life++;
      if (this.life > this.maxLife ||
          this.x < -20 || this.x > W + 20 ||
          this.y < -20 || this.y > H + 20) this.reset();
    }
  }

  for (let i = 0; i < N; i++) nodes.push(new Node());

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const n of nodes) n.update();

    const D = 140;
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < D) {
          const a = (1 - d / D) * 0.35;
          ctx.save();
          ctx.globalAlpha  = a;
          ctx.strokeStyle  = nodes[i].c;
          ctx.lineWidth    = 0.6;
          ctx.shadowColor  = nodes[i].c;
          ctx.shadowBlur   = 4;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
          ctx.restore();
        }
      }
      ctx.save();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle   = nodes[i].c;
      ctx.shadowColor = nodes[i].c;
      ctx.shadowBlur  = 8;
      ctx.beginPath();
      ctx.arc(nodes[i].x, nodes[i].y, nodes[i].r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── SEQUENCER ── */
(function () {
  const brandUnit  = document.getElementById('brand-unit');
  const logoImg    = document.getElementById('logo-img');
  const tagline    = document.getElementById('brand-tagline');
  const sceneMiss  = document.getElementById('scene-missile');
  const missInner  = document.getElementById('missile-inner');
  const sceneEnd   = document.getElementById('scene-end');
  const endInner   = document.getElementById('end-inner');

  const delay = ms => new Promise(r => setTimeout(r, ms));

  async function run() {
    await delay(400);
    brandUnit.classList.add('show');

    await delay(150);
    logoImg.classList.add('show');

    await delay(350);
    tagline.classList.add('show');

    await delay(2400);

    brandUnit.style.transition = 'opacity 0.6s ease';
    brandUnit.style.opacity    = '0';
    await delay(700);

    sceneMiss.classList.add('show');
    await delay(150);
    missInner.classList.add('show');

    await delay(5500);

    sceneMiss.style.transition = 'opacity 0.8s ease';
    sceneMiss.style.opacity    = '0';
    await delay(900);

    sceneEnd.classList.add('show');
    endInner.classList.add('show');

    await delay(4000);

    sceneEnd.style.transition = 'opacity 0.6s ease';
    sceneEnd.style.opacity    = '0';
    await delay(700);

    brandUnit.removeAttribute('style');
    brandUnit.classList.remove('show');
    logoImg.classList.remove('show');
    tagline.classList.remove('show');

    sceneMiss.removeAttribute('style');
    sceneMiss.classList.remove('show');
    missInner.classList.remove('show');

    sceneEnd.removeAttribute('style');
    sceneEnd.classList.remove('show');
    endInner.classList.remove('show');

    await delay(200);
    run();
  }

  run();
})();
</script>
</body>
</html>
